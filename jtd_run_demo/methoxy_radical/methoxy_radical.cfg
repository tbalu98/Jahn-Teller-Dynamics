# PVC (polynomial vibronic coupling) — methoxy radical
#
# Run from repo root:
#   jtd_run --config jtd_run_demo/methoxy_radical/methoxy_radical.cfg
#
# Paths are relative to the repository root (cwd).

# ==================== Essential Settings ====================
[essentials]

# Input CSVs and output results (relative to repo root)
input_folder = jtd_run_demo/methoxy_radical
output_folder = results/methoxy_radical

# CSV field separator for inputs and saved results
separator = ;

# Build and store H as sparse matrices
use_sparse = true

# Save Hamiltonian as NPZ after build
save_npz = true


# ==================== Model Inputs ====================
[model]

# Phonon basis truncation — set only ONE of the following:
#
# Total phonon number: sum_i n_i <= N
# maximum_number_of_vibrational_quanta = 10
#
# Energy cutoff: sum_i n_i e_i <= phonon_encut (e_i from modes.csv)
phonon_encut = 8000
#
# Same cap per mode: n_i <= N for every mode
# maximum_number_of_quanta_per_dim = 4
#
# Per-mode caps from modes.csv column maximum_quanta (each mode can differ)
# use_maximum_quanta_from_modes_csv = true

# CSV files (paths relative to input_folder)
electron_energies = electron_energies.csv
modes = modes.csv
coupling = coupling_quartic_for_herm.csv

# Coupling CSV completion (fill missing partner / diagonal / permutation rows)
diagonal_completion = true
hermitian_completion = false
permutation_completion = true

# Replace H by (H + H†) / 2 if assembly is not already Hermitian
symmetrize_hamiltonian = true

# Use dimensionless normal-mode coordinates (Q = sqrt(omega) * q)
dimensionless_coordinates = true

# Shift phonon energies to the null-point vibrational minimum
null_point_vib = true


# ==================== Builder (parallel coupling assembly) ====================
[builder]

# Split coupling rows into memory waves; cache cleared between waves
lined_coupling_batches = 16

# Worker processes per wave (Unix; use 1 on Slurm with --ntasks=1)
lined_coupling_workers = 8


# ==================== Eigensolver ====================
[eigensolver]

# Allow non-Hermitian H; diagonalize with scipy eigs (not eigsh)
require_hermitian = false

# Diagonalization backend: sparse (SciPy Lanczos / eigsh)
solver = scipy

# Request lowest real eigenvalues
spectral_which = smallest_real

# Number of eigenpairs to compute
num_eigs = 40

# ARPACK convergence knobs (sparse backend)
tol = 1e-12
max_iter = 2000
ncv = 60
