# PVC (polynomial vibronic coupling) — butatrien cation
#
# Run from repo root:
#   jtd_run --config jtd_run_demo/butatrien_cation/butatrien_cation.cfg
#
# Paths are relative to the repository root (cwd).

# ==================== Essential Settings ====================
[essentials]

# Input CSVs and output results (relative to repo root)
input_folder = jtd_run_demo/butatrien_cation
output_folder = results/butatrien_cation

# Build and store H as sparse matrices
use_sparse = true


# ==================== Model Inputs ====================
[model]

# Phonon basis truncation — set only ONE of the following:
#
# Total phonon number: sum_i n_i <= N
#maximum_number_of_vibrational_quanta = 2
#
# Energy cutoff: sum_i n_i e_i <= phonon_encut (e_i from modes.csv)
#phonon_encut = 0.01
#
# Same cap per mode: n_i <= N for every mode
#maximum_number_of_quanta_per_dim = 4
#
# Per-mode caps from modes.csv column maximum_quanta (each mode can differ)
use_maximum_quanta_from_modes_csv = true

# CSV files (paths relative to input_folder)
electron_energies = electron_energies.csv
modes = modes.csv
coupling = coupling.csv

# Use physical (not dimensionless) vibrational coordinates
dimensionless_coordinates = false

# Do not shift phonon energies to the null-point minimum
null_point_vib = false


# ==================== Eigensolver ====================
[eigensolver]

# Number of lowest eigenpairs to compute
num_eigs = 10

# Diagonalization backend: scipy (SciPy Lanczos / eigsh)
solver = scipy

# CSV field separator for saved results
separator = ;

# Output options
save_npz = true
save_csv = true
