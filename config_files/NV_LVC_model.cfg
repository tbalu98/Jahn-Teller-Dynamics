# Example configuration for `python3 -m jahn_teller_dynamics.LVC --config config_files/LVC_run.cfg`
#
# Paths are interpreted relative to the repository root.

[essentials]
# Phonon truncation order used by LVC.py (mapped from the existing project key name)
maximum_number_of_vibrational_quanta = 1

# Input folder containing the LVC CSV files
input_folder = data/LVC_model/NV_center/

# Output folder for eigenvalues/eigenvectors
output_folder = results/LVC/NV_center/

# Use sparse matrices/solver
use_sparse = true

[LVC]
save_npz = true
save_csv = false
# CSV filenames (interpreted relative to input_folder)
# New physical naming (preferred):
state_energy = LVC_epsilon.csv
coupling = LVC_lambda.csv
tuning = LVC_kappa.csv
modes = modes.csv

# Run options
num_eigs = 512
separator = ;

# Phonon options (defaults: both true)
# dimensionless_coordinates = true   # Use dimensionless q=(a+a†)/√2
# null_point_vib = true              # Include 0.5*ħω zero-point energy in H

