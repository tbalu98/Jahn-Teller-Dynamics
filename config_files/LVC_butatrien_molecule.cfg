# Config for the butatrien molecule CSV set under `data/LVC_model/butatrien_molecule/`
#
# Run:
#   python3 -m jahn_teller_dynamics.LVC --config config_files/LVC_butatrien_molecule.cfg
#
# Paths are interpreted relative to the repository root.

[essentials]
# Phonon truncation order used by LVC.py
maximum_number_of_vibrational_quanta = 2

# Folder containing the butatrien molecule CSV files
input_folder = data/LVC_model/butatrien_molecule

# Output folder for eigenvalues/eigenvectors
output_folder = results/LVC/butatrien_molecule

# Use sparse matrices/solver
use_sparse = true

[LVC]
# CSV filenames (interpreted relative to input_folder)
state_energy = orb_energies.csv
coupling = coupling.csv
tuning = tuning.csv
modes = modes.csv

# Run options
num_eigs = 162
separator = ;

# Phonon options (defaults: both true)
# dimensionless_coordinates = true   # Use dimensionless q=(a+a†)/√2
# null_point_vib = true              # Include 0.5*ħω zero-point energy in H

dimensionless_coordinates = false
null_point_vib = false