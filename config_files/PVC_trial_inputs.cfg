# PVC (polynomial vibronic coupling) — trial_inputs under data/dJT_data/trial_inputs
#
# Run:
#   python3 -m jahn_teller_dynamics.PVC --config config_files/PVC_trial_inputs.cfg
#
# Paths are relative to the repository root (cwd).

[essentials]
maximum_number_of_vibrational_quanta = 10

input_folder = data/dJT_data/trial_inputs

output_folder = results/PVC/trial_inputs/4th_order

use_sparse = true

[PVC]
electron_energies = electron_energies.csv
modes = modes.csv
coupling = coupling.csv

num_eigs = all

separator = ;

save_npz = true
save_csv = true
