# Configuration for LVC absorption spectrum calculation.
#
# Run:
#   python3 scripts/calculate_spectrum.py --config config_files/NV_spectrum.cfg
#
# data_folder: base for input data (dipole); paths relative to repo root.
# output_folder: base for npz input and output; paths relative to repo root.
# (Legacy key results_folder is still accepted.)

[spectrum]
# Base folders (paths relative to repo root)
data_folder = data/LVC_model
output_folder = results/LVC_model/NV_center_2

# Path to LVC eigenvectors.npz (relative to output_folder)
npz = eigenvectors.npz

# Dipole: either single file (dipole) or all three (dipole_x, dipole_y, dipole_z)
# With dipole_x/y/z: intensity = |<e0|Dx|ei>|² + |<e0|Dy|ei>|² + |<e0|Dz|ei>|²
dipole = NV_center/dipole_DMZ.csv

# Output file prefix (relative to output_folder); creates {output_prefix}.png and {output_prefix}.csv
output_prefix = 2_quantum_Z_spectrum

# CSV separator for dipole file
separator = ;

# Energy unit of eigenvalues in NPZ: eV, meV, cm-1, or hartree (ha)
# Output is always in eV
energy_unit = ha

# Optional: [smearing_function] section for spectrum broadening
# function = lorentzian
# HWHM = 0.01
# amplitude = 1.0

# Optional [smearing_function] section for spectrum broadening:
# [smearing_function]
# function = lorentzian
# HWHM = 0.01
# amplitude = 1.0

# Optional [smearing_function] section for spectrum broadening:
# [smearing_function]
# function = lorentzian
# HWHM = 0.05
# amplitude = 1.0
